name: '[TEST] Deploy last ci tag to PRODUCTION (scheduled)'
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (echo only)
    runs-on: ubuntu-latest
    steps:
      - name: Get timestamp
        id: ts
        run: echo "time=$(date -u '+%H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Simulate deploy
        run: echo "[TEST] Would deploy production here at ${{ steps.ts.outputs.time }}"

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}"
            text: "[TEST] Production deploy completed at ${{ steps.ts.outputs.time }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "[TEST] *Production deploy completed* at ${{ steps.ts.outputs.time }}"
