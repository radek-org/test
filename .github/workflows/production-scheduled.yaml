name: '[TEST] Deploy last ci tag to PRODUCTION (scheduled)'
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (echo only)
    runs-on: ubuntu-latest
    steps:
      - name: Simulate deploy
        run: echo "[TEST] Would deploy production here at $(date -u)"

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}"
            text: "[TEST] \u2705 Production deploy completed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "[TEST] \u2705 *Production deploy completed* at $(date -u '+%H:%M UTC')"
