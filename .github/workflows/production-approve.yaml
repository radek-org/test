name: '[TEST] Production deploy — approve or reject'
on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        description: 'Approve or reject the production deploy'
        options:
          - approve
          - reject
        required: true
      approver:
        type: string
        description: 'Your name (will appear in Slack)'
        required: true

permissions:
  actions: write

jobs:
  record:
    name: Record decision
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Write decision to GitHub variable
        id: write
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ACTION="${{ inputs.action }}"
          APPROVER="${{ inputs.approver }}"

          if [ "$ACTION" = "approve" ]; then
            VALUE="{\"approved\":true,\"rejected\":false,\"date\":\"$TODAY\",\"approver\":\"$APPROVER\",\"approved_at\":\"$NOW\"}"
            EMOJI="✅"
            VERB="approved"
          else
            VALUE="{\"approved\":false,\"rejected\":true,\"date\":\"$TODAY\",\"approver\":\"$APPROVER\",\"approved_at\":\"$NOW\"}"
            EMOJI="❌"
            VERB="rejected"
          fi

          gh api --method PATCH /repos/radek-org/test/actions/variables/PRODUCTION_APPROVAL_STATE \
            -f name=PRODUCTION_APPROVAL_STATE \
            -f "value=$VALUE" 2>/dev/null || \
          gh api --method POST /repos/radek-org/test/actions/variables \
            -f name=PRODUCTION_APPROVAL_STATE \
            -f "value=$VALUE"

          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "verb=$VERB" >> $GITHUB_OUTPUT
          echo "approver=$APPROVER" >> $GITHUB_OUTPUT
          echo "now=$NOW" >> $GITHUB_OUTPUT
          echo "$EMOJI Deploy $VERB by $APPROVER at $NOW"

      - name: Post decision to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}"
            text: "[TEST] ${{ steps.write.outputs.emoji }} Production deploy ${{ steps.write.outputs.verb }} by ${{ steps.write.outputs.approver }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "[TEST] ${{ steps.write.outputs.emoji }} *Production deploy ${{ steps.write.outputs.verb }}* by *${{ steps.write.outputs.approver }}* at ${{ steps.write.outputs.now }}"
